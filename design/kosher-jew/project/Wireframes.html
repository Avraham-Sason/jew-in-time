<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יהודי כשר — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Caveat', cursive; overflow: hidden; }
  .dc-canvas-root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ─── DESIGN TOKENS ─── */
const W = {
  sketch: { border: '2px solid #333', borderRadius: 3 },
  sketchDashed: { border: '2px dashed #999', borderRadius: 3 },
  gold: '#B08D3F',
  burgundy: '#7B1E2A',
  dark: '#1E2A4A',
  light: '#f5f0e8',
  mid: '#c8bfaf',
  red: '#c0392b',
  orange: '#e67e22',
  green: '#27ae60',
};

/* ─── PHONE SHELL ─── */
function Phone({ children, label, scale = 1 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
      {label && <div style={{ fontFamily: 'Caveat', fontSize: 13, color: '#888', letterSpacing: 1 }}>{label}</div>}
      <div style={{
        width: 200 * scale, height: 400 * scale,
        background: '#faf7f2',
        border: '3px solid #333',
        borderRadius: 28 * scale,
        overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        position: 'relative',
        boxShadow: '4px 4px 0 #333',
      }}>
        {/* notch */}
        <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: 60*scale, height: 10*scale, background: '#333', borderRadius: '0 0 8px 8px', zIndex: 10 }} />
        {/* status bar */}
        <div style={{ height: 22*scale, background: '#eee', borderBottom: '1px solid #ccc', display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', padding: `0 10px`, paddingBottom: 2, fontSize: 8*scale, color: '#555', fontFamily: 'Caveat', flexShrink: 0, paddingTop: 6*scale }}>
          <span>9:41</span>
          <span>●●●</span>
        </div>
        {/* content */}
        <div style={{ flex: 1, overflow: 'hidden', direction: 'rtl', display: 'flex', flexDirection: 'column' }}>
          {children}
        </div>
        {/* home indicator */}
        <div style={{ height: 14*scale, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#faf7f2', flexShrink: 0 }}>
          <div style={{ width: 40*scale, height: 3*scale, background: '#333', borderRadius: 2 }} />
        </div>
      </div>
    </div>
  );
}

/* ─── BOTTOM TABS ─── */
function BottomTabs({ active = 0, scale = 1 }) {
  const tabs = [
    { icon: '⌂', label: 'בית' },
    { icon: '◷', label: 'לוח' },
    { icon: '☰', label: 'מצוות' },
  ];
  return (
    <div style={{ height: 36*scale, borderTop: '2px solid #333', display: 'flex', background: '#fff', flexShrink: 0 }}>
      {tabs.map((t, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1, opacity: i === active ? 1 : 0.4 }}>
          <div style={{ fontSize: 11*scale, color: i === active ? W.gold : '#555' }}>{t.icon}</div>
          <div style={{ fontSize: 7*scale, color: i === active ? W.gold : '#555', fontFamily: 'Caveat' }}>{t.label}</div>
          {i === active && <div style={{ width: 20*scale, height: 2, background: W.gold, borderRadius: 1 }} />}
        </div>
      ))}
    </div>
  );
}

/* ─── TIME RIBBON ─── */
function TimeRibbon({ fill = 0.6, color = W.green, label = '', scale = 1 }) {
  const c = fill > 0.7 ? W.green : fill > 0.35 ? W.orange : W.red;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
      {label && <div style={{ fontSize: 7*scale, color: '#888', fontFamily: 'Caveat' }}>{label}</div>}
      <div style={{ height: 5*scale, background: '#ddd', borderRadius: 3, overflow: 'hidden', border: '1px solid #bbb' }}>
        <div style={{ width: `${fill*100}%`, height: '100%', background: c, borderRadius: 3, transition: 'width 0.3s' }} />
      </div>
    </div>
  );
}

/* ─── MITZVAH CARD ─── */
function MitzvahCard({ name, time, fill, checked, scale = 1, accent = false }) {
  return (
    <div style={{
      margin: `${3*scale}px ${5*scale}px`,
      padding: `${5*scale}px`,
      border: `2px solid ${accent ? W.gold : '#ccc'}`,
      borderRadius: 6,
      background: checked ? '#f0ebe0' : '#fff',
      position: 'relative',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
          {/* icon placeholder */}
          <div style={{ width: 16*scale, height: 16*scale, border: '2px solid #aaa', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8*scale, flexShrink: 0 }}>✦</div>
          <div style={{ fontFamily: 'Caveat', fontSize: 10*scale, fontWeight: 700, color: '#222' }}>{name}</div>
        </div>
        <div style={{
          width: 18*scale, height: 18*scale, border: `2px solid ${checked ? W.gold : '#999'}`,
          borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: checked ? W.gold : 'transparent', fontSize: 9*scale, color: '#fff', flexShrink: 0
        }}>{checked ? '✓' : ''}</div>
      </div>
      <TimeRibbon fill={fill} scale={scale} />
      <div style={{ fontSize: 7*scale, color: '#888', marginTop: 3, fontFamily: 'Caveat' }}>{time}</div>
      {checked && (
        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%) rotate(-12deg)', border: `2px solid ${W.gold}`, color: W.gold, fontSize: 9*scale, padding: '1px 5px', opacity: 0.7, fontFamily: 'Caveat', whiteSpace: 'nowrap' }}>נעשה!</div>
      )}
    </div>
  );
}

/* ─── SECTION HEADER (in phone) ─── */
function SectionHeader({ title, subtitle, scale = 1 }) {
  return (
    <div style={{ padding: `${4*scale}px ${8*scale}px ${3*scale}px`, borderBottom: '1px dashed #ccc' }}>
      <div style={{ fontSize: 10*scale, fontWeight: 700, color: W.dark, fontFamily: 'Caveat' }}>{title}</div>
      {subtitle && <div style={{ fontSize: 7*scale, color: '#888', fontFamily: 'Caveat' }}>{subtitle}</div>}
    </div>
  );
}

/* ─── DATE HEADER ─── */
function DateHeader({ scale = 1 }) {
  return (
    <div style={{ padding: `${8*scale}px`, background: W.dark, color: '#fff', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
      <div>
        <div style={{ fontSize: 11*scale, fontWeight: 700, fontFamily: 'Caveat' }}>כ״ד ניסן תשפ״ו</div>
        <div style={{ fontSize: 8*scale, color: '#aac', fontFamily: 'Caveat' }}>יום שישי · פרשת אחרי מות</div>
      </div>
      <div style={{ textAlign: 'left', fontSize: 8*scale, color: W.gold, fontFamily: 'Caveat' }}>ירושלים</div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN A: HomeScreen — Card Stack
══════════════════════════════════════════ */
function HomeA() {
  const s = 1;
  return (
    <Phone label="A — כרטיסים" scale={s}>
      <DateHeader scale={s} />
      <div style={{ flex: 1, overflowY: 'auto' }}>
        <SectionHeader title="⚡ כעת רלוונטי" subtitle="3 מצוות פעילות" scale={s} />
        <MitzvahCard name="תפילת שחרית" time="נותר: 45 דק׳" fill={0.25} scale={s} accent />
        <MitzvahCard name="הנחת תפילין" time="נותר: 45 דק׳" fill={0.25} scale={s} />
        <MitzvahCard name="ברכות השחר" time="בוצע 07:30" fill={1} checked scale={s} />
        <SectionHeader title="🕓 הבא בתור" scale={s} />
        <div style={{ margin: '3px 5px', padding: '5px 8px', border: '2px dashed #bbb', borderRadius: 6, background: '#f9f7f3' }}>
          <div style={{ fontSize: 9, color: '#888', fontFamily: 'Caveat' }}>🕍  מנחה — מ-13:15</div>
          <div style={{ fontSize: 7, color: '#aaa', fontFamily: 'Caveat' }}>עוד 2 שעות ו-30 דק׳</div>
        </div>
      </div>
      <BottomTabs active={0} scale={s} />
    </Phone>
  );
}

/* ══════════════════════════════════════════
   SCREEN B: HomeScreen — Timeline Strip
══════════════════════════════════════════ */
function HomeB() {
  const s = 1;
  const hours = ['06', '08', '10', '12', '14', '16', '18'];
  const blocks = [
    { name: 'ברכות', start: 1, width: 1, color: W.gold, done: true },
    { name: 'תפילין', start: 2.5, width: 2.5, color: W.green },
    { name: 'שחרית', start: 2, width: 3, color: W.dark },
    { name: 'ק"ש', start: 2, width: 1.5, color: W.burgundy },
    { name: 'מנחה', start: 7.5, width: 2, color: '#555' },
    { name: 'ערבית', start: 11.5, width: 2, color: '#333' },
  ];
  return (
    <Phone label="B — ציר זמן יומי" scale={s}>
      <DateHeader scale={s} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 6px' }}>
        {/* mini timeline */}
        <div style={{ marginBottom: 6, marginTop: 2 }}>
          <div style={{ fontSize: 8, color: '#888', fontFamily: 'Caveat', marginBottom: 2 }}>ציר הזמן — היום</div>
          <div style={{ position: 'relative', height: 60, border: '1.5px solid #ccc', borderRadius: 4, background: '#f9f7f3', overflow: 'hidden' }}>
            {/* now line */}
            <div style={{ position: 'absolute', top: 0, bottom: 0, left: '38%', width: 1.5, background: W.burgundy, zIndex: 5 }} />
            {blocks.map((b, i) => (
              <div key={i} style={{
                position: 'absolute',
                top: `${(i % 3) * 18 + 4}px`,
                left: `${(b.start / 13) * 100}%`,
                width: `${(b.width / 13) * 100}%`,
                height: 14,
                background: b.done ? '#ccc' : b.color,
                opacity: b.done ? 0.5 : 0.8,
                borderRadius: 2,
                display: 'flex', alignItems: 'center',
              }}>
                <span style={{ fontSize: 6, color: '#fff', paddingRight: 2, fontFamily: 'Caveat', whiteSpace: 'nowrap', overflow: 'hidden' }}>{b.name}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 6, color: '#aaa', marginTop: 1, fontFamily: 'Caveat' }}>
            {hours.map(h => <span key={h}>{h}</span>)}
          </div>
        </div>
        <SectionHeader title="⚡ עכשיו" scale={s} />
        {/* compact list */}
        {[
          { name: 'תפילת שחרית', fill: 0.22, time: '45 דק׳' },
          { name: 'הנחת תפילין', fill: 0.22, time: '45 דק׳' },
        ].map((m, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '4px 5px', borderBottom: '1px solid #eee' }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 9, fontFamily: 'Caveat', fontWeight: 700 }}>{m.name}</div>
              <TimeRibbon fill={m.fill} scale={s} label={`נותר ${m.time}`} />
            </div>
            <div style={{ width: 18, height: 18, border: '2px solid #999', borderRadius: 3 }} />
          </div>
        ))}
        <SectionHeader title="✓ הושלמו" scale={s} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '4px 5px', opacity: 0.5 }}>
          <div style={{ fontSize: 9, fontFamily: 'Caveat', flex: 1 }}>ברכות השחר</div>
          <div style={{ fontSize: 8, color: W.gold, fontFamily: 'Caveat' }}>✓ 07:30</div>
        </div>
      </div>
      <BottomTabs active={0} scale={s} />
    </Phone>
  );
}

/* ══════════════════════════════════════════
   SCREEN C: HomeScreen — Urgency Wheel
══════════════════════════════════════════ */
function HomeC() {
  const s = 1;
  return (
    <Phone label="C — עיגול דחיפות" scale={s}>
      <DateHeader scale={s} />
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {/* circular progress area */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 0' }}>
          <svg width={100} height={100} viewBox="0 0 100 100">
            {/* day arc */}
            <circle cx="50" cy="50" r="40" fill="none" stroke="#eee" strokeWidth="8"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke={W.dark} strokeWidth="8"
              strokeDasharray={`${251 * 0.4} 251`} strokeLinecap="round"
              transform="rotate(-90 50 50)" />
            {/* inner */}
            <circle cx="50" cy="50" r="28" fill="none" stroke="#f0ebe0" strokeWidth="1"/>
            <text x="50" y="46" textAnchor="middle" fontSize="9" fontFamily="Caveat" fill={W.dark} fontWeight="bold">3/8</text>
            <text x="50" y="56" textAnchor="middle" fontSize="6" fontFamily="Caveat" fill="#888">מצוות היום</text>
            {/* urgent dot */}
            <circle cx="50" cy="12" r="5" fill={W.red} />
            <text x="50" y="15" textAnchor="middle" fontSize="5" fill="#fff" fontFamily="Caveat">!</text>
          </svg>
          <div style={{ fontSize: 7, color: W.red, fontFamily: 'Caveat', marginTop: -4 }}>2 דחופות — פג זמן בקרוב</div>
        </div>
        {/* urgent cards */}
        <div style={{ margin: '0 5px 3px', padding: '3px 6px', background: '#fff5f5', border: `2px solid ${W.red}`, borderRadius: 6 }}>
          <div style={{ fontSize: 8, color: W.red, fontFamily: 'Caveat', marginBottom: 3, fontWeight: 700 }}>⚠ דחוף</div>
          {[
            { name: 'תפילת שחרית', fill: 0.15, time: '23 דק׳' },
            { name: 'הנחת תפילין', fill: 0.18, time: '27 דק׳' },
          ].map((m, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 4 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 9, fontFamily: 'Caveat', fontWeight: 700 }}>{m.name}</div>
                <TimeRibbon fill={m.fill} scale={s} />
              </div>
              <div style={{ fontSize: 7, color: W.red, fontFamily: 'Caveat' }}>{m.time}</div>
              <div style={{ width: 18, height: 18, border: `2px solid ${W.red}`, borderRadius: 3, fontSize: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', color: W.red }}>✓</div>
            </div>
          ))}
        </div>
        <div style={{ margin: '0 5px', padding: '3px 6px', border: '2px solid #ccc', borderRadius: 6 }}>
          <div style={{ fontSize: 8, color: '#888', fontFamily: 'Caveat', marginBottom: 3 }}>📋 שאר היום</div>
          {['מנחה', 'ערבית', 'ברכת המזון'].map((m, i) => (
            <div key={i} style={{ fontSize: 9, fontFamily: 'Caveat', color: '#666', borderBottom: '1px dashed #eee', padding: '2px 0' }}>{m}</div>
          ))}
        </div>
      </div>
      <BottomTabs active={0} scale={s} />
    </Phone>
  );
}

/* ══════════════════════════════════════════
   SCHEDULE SCREEN — Day View
══════════════════════════════════════════ */
function ScheduleDay() {
  const s = 1;
  const items = [
    { time: '06:00', name: 'נץ החמה', type: 'zman', color: W.gold },
    { time: '07:00', name: 'ברכות השחר', type: 'mitzvah', color: W.dark, done: true },
    { time: '07:00', name: 'הנחת תפילין', type: 'mitzvah', color: W.dark },
    { time: '07:15', name: 'תפילת שחרית', type: 'mitzvah', color: W.dark },
    { time: '09:34', name: 'סוף זמן ק"ש', type: 'zman', color: W.burgundy },
    { time: '10:42', name: 'סוף שחרית', type: 'zman', color: '#999' },
    { time: '13:15', name: 'מנחה גדולה', type: 'mitzvah', color: '#555' },
    { time: '17:45', name: 'מנחה קטנה', type: 'mitzvah', color: '#555' },
    { time: '19:12', name: 'שקיעה', type: 'zman', color: W.gold },
    { time: '19:45', name: 'ערבית', type: 'mitzvah', color: W.dark },
  ];
  return (
    <Phone label="לוח זמנים — יום" scale={s}>
      {/* header */}
      <div style={{ background: W.dark, color: '#fff', padding: '5px 8px', flexShrink: 0 }}>
        <div style={{ fontSize: 9, fontFamily: 'Caveat', fontWeight: 700 }}>כ״ד ניסן תשפ״ו</div>
        <div style={{ display: 'flex', gap: 4, marginTop: 3 }}>
          {['יום','שבוע','חודש'].map((t, i) => (
            <div key={i} style={{ fontSize: 7, fontFamily: 'Caveat', padding: '1px 5px', borderRadius: 10, background: i===0 ? W.gold : 'transparent', color: i===0 ? W.dark : '#aaa', border: `1px solid ${i===0 ? W.gold : '#555'}` }}>{t}</div>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 0' }}>
        {items.map((item, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, padding: '3px 8px', borderBottom: '1px solid #f0ede8' }}>
            <div style={{ fontSize: 8, color: '#999', fontFamily: 'Caveat', width: 28, flexShrink: 0, textAlign: 'left' }}>{item.time}</div>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: item.type === 'zman' ? '#ddd' : item.color, border: `1.5px solid ${item.color}`, marginTop: 3, flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 9, fontFamily: 'Caveat', fontWeight: item.type==='zman' ? 400 : 700, color: item.type==='zman' ? '#999' : '#222', textDecoration: item.done ? 'line-through' : 'none', opacity: item.done ? 0.5 : 1 }}>{item.name}</div>
            </div>
            {item.type === 'mitzvah' && !item.done && (
              <div style={{ width: 14, height: 14, border: '1.5px solid #bbb', borderRadius: 3, flexShrink: 0 }} />
            )}
            {item.done && <div style={{ fontSize: 8, color: W.gold }}>✓</div>}
          </div>
        ))}
      </div>
      <BottomTabs active={1} scale={s} />
    </Phone>
  );
}

/* ══════════════════════════════════════════
   LIBRARY SCREEN
══════════════════════════════════════════ */
function LibraryScreen() {
  const s = 1;
  const mitzvot = [
    { name: 'הנחת תפילין', cat: 'יומית', active: true },
    { name: 'ציצית', cat: 'יומית', active: true },
    { name: 'ק"ש שחרית', cat: 'יומית', active: true },
    { name: 'תפילת שחרית', cat: 'יומית', active: true },
    { name: 'ברכת המזון', cat: 'יומית', active: false },
    { name: 'ספירת העומר', cat: 'עונתי', active: true },
  ];
  return (
    <Phone label="מצוות שלי" scale={s}>
      <div style={{ background: W.dark, color: '#fff', padding: '5px 8px', flexShrink: 0 }}>
        <div style={{ fontSize: 10, fontFamily: 'Caveat', fontWeight: 700 }}>מצוות שלי</div>
        <div style={{ display: 'flex', gap: 4, marginTop: 3 }}>
          {['פעילות','להוסיף'].map((t, i) => (
            <div key={i} style={{ fontSize: 7, fontFamily: 'Caveat', padding: '1px 6px', borderRadius: 10, background: i===0 ? W.gold : 'transparent', color: i===0 ? W.dark : '#aac', border: `1px solid ${i===0 ? W.gold : '#555'}` }}>{t}</div>
          ))}
        </div>
      </div>
      {/* category tabs */}
      <div style={{ display: 'flex', gap: 2, padding: '4px 5px', borderBottom: '1px solid #ddd', flexShrink: 0, overflowX: 'auto' }}>
        {['הכל','יומית','שבועית','עונתי'].map((t, i) => (
          <div key={i} style={{ fontSize: 7, fontFamily: 'Caveat', padding: '2px 5px', borderRadius: 10, background: i===0 ? W.dark : '#f0ede8', color: i===0 ? '#fff' : '#666', whiteSpace: 'nowrap', border: '1px solid #ccc' }}>{t}</div>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {mitzvot.map((m, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 8px', borderBottom: '1px solid #f0ede8' }}>
            <div style={{ width: 18, height: 18, border: '1.5px solid #ccc', borderRadius: 4, background: '#f9f7f3', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9 }}>✦</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 9, fontFamily: 'Caveat', fontWeight: 700 }}>{m.name}</div>
              <div style={{ fontSize: 7, color: '#aaa', fontFamily: 'Caveat' }}>{m.cat}</div>
            </div>
            {/* toggle */}

                <div style={{ width: 80, padding: 6, border: `2px solid ${W.gold}`, borderRadius: 6, background: '#fffbf0', position: 'relative', opacity: 0.7 }}>
                  <div style={{ fontSize: 8, fontWeight: 700 }}>הנחת תפילין</div>
                  <div style={{ height: 5, background: '#eee', borderRadius: 3, margin: '3px 0', overflow: 'hidden' }}>
                    <div style={{ width: '100%', height: '100%', background: W.gold }} />
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                    <div style={{ width: 14, height: 14, border: `2px solid ${W.gold}`, borderRadius: 3, background: W.gold, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, color: '#fff' }}>✓</div>
                  </div>
                  {/* stamp overlay */}
                  <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%) rotate(-15deg)', border: `2px solid ${W.gold}`, color: W.gold, fontSize: 11, padding: '1px 5px', fontWeight: 700, letterSpacing: 1 }}>נעשה!</div>
                </div>
              </div>
            </div>
            <Note color={W.gold} style={{ fontSize: 10 }}>הcancellation של שאר ההתראות קורה ברקע אוטומטית</Note>
          </div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
